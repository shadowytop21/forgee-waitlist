<script>
/* ═══════════════════════════════════════
   COUNTDOWN TIMER — set to 25 days from now
═══════════════════════════════════════ */
(function(){
  // Set launch to 25 days from the moment the page is loaded
  const LAUNCH = Date.now() + 25 * 24 * 60 * 60 * 1000;

  const pad=n=>String(n).padStart(2,'0');
  function flip(el,val){ if(!el) return; el.textContent=val; }

  const dEl=document.getElementById('cd-days');
  const hEl=document.getElementById('cd-hours');
  const mEl=document.getElementById('cd-mins');
  const sEl=document.getElementById('cd-secs');

  function tick(){
    const now=Date.now();
    let diff=Math.max(0, LAUNCH - now);
    const days=Math.floor(diff / (24*60*60*1000));
    diff -= days * (24*60*60*1000);
    const hours=Math.floor(diff / (60*60*1000));
    diff -= hours * (60*60*1000);
    const mins=Math.floor(diff / (60*1000));
    diff -= mins * (60*1000);
    const secs=Math.floor(diff / 1000);
    if(dEl) flip(dEl, pad(days));
    if(hEl) flip(hEl, pad(hours));
    if(mEl) flip(mEl, pad(mins));
    if(sEl) flip(sEl, pad(secs));
  }
  tick(); setInterval(tick,1000);
})();

/* ═══════════════════════════════════════
   FORMS — wire hero and countdown forms to /api/subscribe
   Preserves existing UI behaviour and messages.
═══════════════════════════════════════ */

function valid(e){return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.trim())}

async function postSubscribe(email, source){
  try{
    const res = await fetch('/api/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, source })
    });
    return await res.json();
  }catch(err){ return { error: String(err) }; }
}

async function heroSubmit(){
  const el=document.getElementById('hero-email');
  const err=document.getElementById('hero-err');
  const ok=document.getElementById('hero-ok');
  if(err) err.style.display='none'; if(ok) ok.style.display='none';
  if(!el) return;
  const email = el.value || '';
  if(!valid(email)){ if(err){ err.textContent='Please enter a valid email.'; err.style.display='block'; } return; }
  if(ok) ok.textContent='Saving...'; if(ok) ok.style.display='block';

  const r = await postSubscribe(email, 'hero');
  if(r && r.ok){ if(ok) ok.textContent="✓ You're in. See you at launch."; el.value=''; }
  else { if(ok) ok.style.display='none'; if(err){ err.textContent = (r && (r.error||r.message)) ? (r.error||r.message) : 'Submission failed'; err.style.display='block'; } }
}

async function cdSubmit(){
  const el=document.getElementById('cd-email');
  const err=document.getElementById('cd-err');
  const ok=document.getElementById('cd-ok');
  if(err) err.style.display='none'; if(ok) ok.style.display='none';
  if(!el) return;
  const email = el.value || '';
  if(!valid(email)){ if(err){ err.textContent='Please enter a valid email.'; err.style.display='block'; } return; }
  if(ok) ok.textContent='Saving...'; if(ok) ok.style.display='block';

  const r = await postSubscribe(email, 'countdown');
  if(r && r.ok){ if(ok) ok.textContent='✓ You\'re in. See you at launch.'; el.value=''; }
  else { if(ok) ok.style.display='none'; if(err){ err.textContent = (r && (r.error||r.message)) ? (r.error||r.message) : 'Submission failed'; err.style.display='block'; } }
}

// Keep Enter key handling consistent with original page
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  if(document.activeElement.id==='hero-email') heroSubmit();
  if(document.activeElement.id==='cd-email') cdSubmit();
});
</script>
