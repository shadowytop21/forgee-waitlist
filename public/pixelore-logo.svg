<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">Pixelore logo</title>
  <desc id="desc">Pixel anvil icon with molten core on a transparent background.</desc>
  <defs>
    <linearGradient id="metalDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a2a"/>
      <stop offset="0.55" stop-color="#101010"/>
      <stop offset="1" stop-color="#232323"/>
    </linearGradient>
    <linearGradient id="metalMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a3a3a"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <linearGradient id="topRim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f2ed"/>
      <stop offset="1" stop-color="#d9d3ca"/>
    </linearGradient>
    <linearGradient id="ember" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb533"/>
      <stop offset="1" stop-color="#ff6a00"/>
    </linearGradient>
  </defs>

  <g shape-rendering="crispEdges">
    <rect x="72" y="34" width="126" height="16" fill="url(#topRim)"/>
    <rect x="58" y="50" width="140" height="10" fill="url(#topRim)"/>
    <rect x="92" y="50" width="80" height="40" fill="#141414"/>

    <rect x="32" y="66" width="50" height="16" fill="url(#metalMid)"/>
    <rect x="18" y="78" width="48" height="20" fill="url(#metalDark)"/>
    <rect x="64" y="84" width="46" height="24" fill="url(#metalDark)"/>

    <rect x="96" y="60" width="108" height="64" fill="url(#metalDark)"/>
    <rect x="120" y="124" width="60" height="32" fill="url(#metalDark)"/>

    <rect x="108" y="156" width="84" height="20" fill="url(#metalMid)"/>
    <rect x="78" y="176" width="144" height="24" fill="url(#metalDark)"/>

    <rect x="22" y="186" width="42" height="24" fill="url(#metalDark)"/>
    <rect x="52" y="210" width="20" height="12" fill="url(#metalDark)"/>
    <rect x="192" y="186" width="42" height="24" fill="url(#metalDark)"/>
    <rect x="184" y="210" width="20" height="12" fill="url(#metalDark)"/>
    <rect x="124" y="210" width="40" height="18" fill="url(#metalDark)"/>

    <rect x="110" y="150" width="76" height="24" fill="url(#ember)"/>
    <rect x="98" y="162" width="18" height="20" fill="url(#ember)"/>
    <rect x="180" y="162" width="18" height="20" fill="url(#ember)"/>

    <rect x="96" y="60" width="8" height="96" fill="#0c0c0c" opacity="0.65"/>
    <rect x="186" y="62" width="8" height="94" fill="#2f2f2f" opacity="0.5"/>
  </g>
</svg>
